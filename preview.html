<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIGR Preview Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0c111d;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .monitor {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ---- Top Bar ---- */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      background: #141b28;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .top-bar__left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ligr-wordmark {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    .top-bar__divider {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.12);
    }

    .top-bar__label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.03em;
    }

    .top-bar__right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ---- Status Pill ---- */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-pill--standby {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
    }

    .status-pill--preview {
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      color: #f59e0b;
    }

    .status-pill--on-air {
      background: rgba(217,45,32,0.2);
      border: 1px solid rgba(217,45,32,0.4);
      color: #f97066;
    }

    .status-pill__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .status-pill--on-air .status-pill__dot {
      animation: pulseDot 1.4s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    /* ---- Overlay Tabs Bar ---- */
    .overlay-tabs {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 16px;
      background: #141b28;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .overlay-tabs::-webkit-scrollbar { display: none; }

    .overlay-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      background: transparent;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.01em;
    }
    .overlay-tab:hover {
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.06);
    }
    .overlay-tab--active {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    .overlay-tab__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2e90fa;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .overlay-tab--active .overlay-tab__dot { opacity: 1; }

    /* ---- Preview Frame ---- */
    .frame-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0c111d;
      position: relative;
      min-height: 0;
    }

    .frame-container {
      width: 100%;
      max-width: calc((100vh - 48px - 36px - 48px - 48px) * (16/9));
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 20px 60px rgba(0,0,0,0.7);
    }

    .frame-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: opacity 0.25s ease;
    }
    .frame-img.fading { opacity: 0; }

    .frame-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: rgba(255,255,255,0.15);
    }

    .frame-placeholder__icon { opacity: 0.6; }

    .frame-placeholder__text {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    /* Broadcast safe area */
    .frame-safearea {
      position: absolute;
      inset: 5%;
      border: 1px dashed rgba(255,255,255,0.05);
      border-radius: 2px;
      pointer-events: none;
    }

    /* On-air border */
    .frame-container.on-air {
      box-shadow: 0 0 0 2px #d92d20, 0 0 0 4px rgba(217,45,32,0.2), 0 20px 60px rgba(0,0,0,0.7);
    }

    /* ---- Bottom Bar ---- */
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      background: #141b28;
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
      gap: 16px;
    }

    .bottom-bar__left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .bottom-bar__graphic-name {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bottom-bar__graphic-name em {
      font-style: normal;
      color: rgba(255,255,255,0.3);
      margin-right: 6px;
    }

    .bottom-bar__overlay-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      background: rgba(46,144,250,0.12);
      border: 1px solid rgba(46,144,250,0.2);
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 500;
      color: #7ec8fa;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .bottom-bar__right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .bottom-bar__updated {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
    }

    .indicator-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.3s;
    }

    .indicator-dot.flash {
      animation: flashDot 0.6s ease-out forwards;
    }

    @keyframes flashDot {
      0% { background: #17b26a; }
      100% { background: rgba(255,255,255,0.15); }
    }
  </style>
</head>
<body>

<div class="monitor">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar__left">
      <span class="ligr-wordmark">LIGR</span>
      <div class="top-bar__divider"></div>
      <span class="top-bar__label">Preview Monitor</span>
    </div>
    <div class="top-bar__right">
      <div class="indicator-dot" id="indicatorDot"></div>
      <div class="status-pill status-pill--standby" id="statusPill">
        <span class="status-pill__dot"></span>
        <span id="statusLabel">Standby</span>
      </div>
    </div>
  </div>

  <!-- Overlay tabs -->
  <div class="overlay-tabs" id="overlayTabs">
    <button class="overlay-tab overlay-tab--active" data-overlay-id="all">
      <span class="overlay-tab__dot"></span>
      All
    </button>
  </div>

  <!-- Preview frame -->
  <div class="frame-wrapper">
    <div class="frame-container" id="frameContainer">
      <img class="frame-img" id="frameImg" src="" alt="" style="display:none" />
      <div class="frame-safearea"></div>
      <div class="frame-placeholder" id="framePlaceholder">
        <div class="frame-placeholder__icon">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M2 8h20M8 8v14"/></svg>
        </div>
        <span class="frame-placeholder__text" id="placeholderText">Waiting for preview signal…</span>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="bottom-bar__left">
      <div class="bottom-bar__graphic-name" id="graphicNameEl">
        <em>Graphic</em><span id="graphicNameText">—</span>
      </div>
      <span class="bottom-bar__overlay-badge" id="overlayBadge" style="display:none">—</span>
    </div>
    <div class="bottom-bar__right">
      <span class="bottom-bar__updated" id="updatedEl">—</span>
    </div>
  </div>

</div>

<script>
  const frameImg        = document.getElementById('frameImg');
  const framePlaceholder= document.getElementById('framePlaceholder');
  const placeholderText = document.getElementById('placeholderText');
  const frameContainer  = document.getElementById('frameContainer');
  const statusPill      = document.getElementById('statusPill');
  const statusLabel     = document.getElementById('statusLabel');
  const graphicNameText = document.getElementById('graphicNameText');
  const overlayBadge    = document.getElementById('overlayBadge');
  const updatedEl       = document.getElementById('updatedEl');
  const indicatorDot    = document.getElementById('indicatorDot');
  const overlayTabsEl   = document.getElementById('overlayTabs');

  let activeOverlayTabId = 'all';
  let lastTimestamp = 0;
  let knownOverlayIds = []; // track built tabs to avoid unnecessary rebuilds

  // ---- Utilities ----

  function formatAge(ts) {
    const diff = Math.round((Date.now() - ts) / 1000);
    if (diff < 5) return 'just now';
    if (diff < 60) return `${diff}s ago`;
    return `${Math.floor(diff / 60)}m ago`;
  }

  function flashIndicator() {
    indicatorDot.classList.remove('flash');
    void indicatorDot.offsetWidth;
    indicatorDot.classList.add('flash');
  }

  // ---- Overlay tabs ----

  function readOverlayConfig() {
    try {
      const raw = localStorage.getItem('ligr_overlay_config');
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }

  function buildOverlayTabs(overlays) {
    // Check if tabs need rebuilding
    const ids = overlays.map(o => o.id);
    if (JSON.stringify(ids) === JSON.stringify(knownOverlayIds)) return;
    knownOverlayIds = ids;

    // Keep 'All' tab, replace the rest
    const allTab = overlayTabsEl.querySelector('[data-overlay-id="all"]');
    overlayTabsEl.innerHTML = '';
    overlayTabsEl.appendChild(allTab);

    overlays.forEach(overlay => {
      const btn = document.createElement('button');
      btn.className = 'overlay-tab' + (activeOverlayTabId === overlay.id ? ' overlay-tab--active' : '');
      btn.dataset.overlayId = overlay.id;
      btn.innerHTML = `<span class="overlay-tab__dot"></span>${overlay.name}`;
      overlayTabsEl.appendChild(btn);
    });

    // Ensure 'All' tab active state is correct
    allTab.classList.toggle('overlay-tab--active', activeOverlayTabId === 'all');

    // If active tab no longer exists, fall back to 'all'
    if (activeOverlayTabId !== 'all' && !ids.includes(activeOverlayTabId)) {
      setActiveTab('all');
    }
  }

  function setActiveTab(overlayId) {
    activeOverlayTabId = overlayId;
    overlayTabsEl.querySelectorAll('.overlay-tab').forEach(tab => {
      tab.classList.toggle('overlay-tab--active', tab.dataset.overlayId === overlayId);
    });
    // Reset display when switching tabs
    lastTimestamp = 0;
  }

  overlayTabsEl.addEventListener('click', (e) => {
    const tab = e.target.closest('.overlay-tab');
    if (!tab || tab.dataset.overlayId === activeOverlayTabId) return;
    setActiveTab(tab.dataset.overlayId);
    poll();
  });

  // ---- State display ----

  function getStateForActiveTab(overlays) {
    if (activeOverlayTabId === 'all') {
      // Find most recently updated state across all overlays
      let latest = null;
      // Also check legacy single-state key
      try {
        const raw = localStorage.getItem('ligr_preview_state');
        if (raw) latest = JSON.parse(raw);
      } catch(e) {}

      overlays.forEach(o => {
        try {
          const raw = localStorage.getItem(`ligr_preview_${o.id}`);
          if (raw) {
            const s = JSON.parse(raw);
            if (!latest || s.timestamp > latest.timestamp) latest = s;
          }
        } catch(e) {}
      });
      return latest;
    } else {
      try {
        const raw = localStorage.getItem(`ligr_preview_${activeOverlayTabId}`);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    }
  }

  function applyState(data) {
    const isNew = data && data.timestamp !== lastTimestamp;
    if (isNew) {
      lastTimestamp = data.timestamp;
      flashIndicator();
    }

    if (!data) {
      // Standby
      frameContainer.classList.remove('on-air');
      statusPill.className = 'status-pill status-pill--standby';
      statusLabel.textContent = 'Standby';
      frameImg.style.display = 'none';
      framePlaceholder.style.display = 'flex';
      graphicNameText.textContent = '—';
      overlayBadge.style.display = 'none';
      updatedEl.textContent = '—';

      // Contextual placeholder text
      if (activeOverlayTabId === 'all') {
        placeholderText.textContent = 'Waiting for preview signal…';
      } else {
        const overlays = readOverlayConfig();
        const o = overlays.find(x => x.id === activeOverlayTabId);
        placeholderText.textContent = o ? `No graphics previewed to ${o.name}` : 'No preview signal';
      }
      return;
    }

    // Update status
    frameContainer.classList.remove('on-air');
    statusPill.className = 'status-pill';
    if (data.state === 'on-air') {
      statusPill.classList.add('status-pill--on-air');
      statusLabel.textContent = 'On Air';
      frameContainer.classList.add('on-air');
    } else if (data.state === 'preview') {
      statusPill.classList.add('status-pill--preview');
      statusLabel.textContent = 'Preview';
    } else {
      statusPill.classList.add('status-pill--standby');
      statusLabel.textContent = 'Standby';
    }

    // Update graphic name
    graphicNameText.textContent = data.name || '—';

    // Update overlay badge
    if (data.overlayName) {
      overlayBadge.textContent = data.overlayName;
      overlayBadge.style.display = 'inline-flex';
    } else {
      overlayBadge.style.display = 'none';
    }

    // Update image with crossfade
    if (data.imgSrc && data.imgSrc !== frameImg.src) {
      frameImg.classList.add('fading');
      setTimeout(() => {
        frameImg.src = data.imgSrc;
        frameImg.onload = () => {
          frameImg.style.display = 'block';
          framePlaceholder.style.display = 'none';
          frameImg.classList.remove('fading');
        };
        frameImg.onerror = () => {
          frameImg.style.display = 'none';
          framePlaceholder.style.display = 'flex';
          frameImg.classList.remove('fading');
        };
      }, 150);
    } else if (!data.imgSrc) {
      frameImg.style.display = 'none';
      framePlaceholder.style.display = 'flex';
    }

    updatedEl.textContent = 'Updated ' + formatAge(data.timestamp);
  }

  // ---- Poll ----

  function poll() {
    const overlays = readOverlayConfig();
    buildOverlayTabs(overlays);
    const state = getStateForActiveTab(overlays);
    applyState(state);

    // Keep updated timestamp ticking
    if (state) {
      updatedEl.textContent = 'Updated ' + formatAge(state.timestamp);
    }
  }

  setInterval(poll, 800);

  window.addEventListener('storage', (e) => {
    if (
      e.key === 'ligr_overlay_config' ||
      e.key === 'ligr_preview_state' ||
      (e.key && e.key.startsWith('ligr_preview_'))
    ) poll();
  });

  poll();
</script>
</body>
</html>
